<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f0f4f8; color:#1a1a2e; font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden; }
  .snow-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .flake { position:absolute; top:-30px; color:#99caea; animation:fall linear infinite; user-select:none; }
  @keyframes fall { to { transform:translateY(110vh) rotate(540deg); } }
  .page { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1rem 3rem; }

  .logo-wrap {
    user-select:none;
    margin-bottom:2.5rem;
    cursor:pointer;
    position:relative;
  }
  .logo-wrap img { width:300px; image-rendering:auto; height:auto; display:block; transition:transform 0.15s, filter 0.15s; filter:drop-shadow(0 0 18px rgba(255,182,193,0.55)) drop-shadow(0 0 40px rgba(255,150,180,0.3)); }
  .logo-wrap.holding img { transform:scale(0.96); filter:brightness(0.85); }

  /* hold progress ring */
  .hold-ring {
    position:absolute;
    inset:-8px;
    border-radius:50%;
    pointer-events:none;
  }
  .hold-hint {
    position:absolute;
    bottom:-22px;
    left:50%;
    transform:translateX(-50%);
    font-size:0.65rem;
    color:#9ab0c0;
    white-space:nowrap;
    opacity:0;
    transition:opacity 0.3s;
    letter-spacing:0.05em;
  }
  .logo-wrap.holding .hold-hint { opacity:1; }

  .form-area { width:100%; max-width:560px; }
  .input-wrap { border:1.5px solid rgba(255,255,255,0.6); border-radius:12px 12px 0 0; background:rgba(255,255,255,0.45); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); box-shadow:0 4px 24px rgba(153,202,234,0.15), inset 0 1px 0 rgba(255,255,255,0.8); }
  .input-wrap input { width:100%; padding:1rem 1rem; border:none; outline:none; font-family:'Inter',sans-serif; font-size:0.95rem; color:#1a1a2e; text-align:center; background:transparent; }
  .input-wrap input::placeholder { color:#9ab0c0; }
  .submit-btn { width:100%; background:#01a7cf; color:#fff; border:none; padding:0.85rem; font-family:'Inter',sans-serif; font-size:0.95rem; font-weight:500; cursor:pointer; border-radius:0 0 12px 12px; transition:background 0.15s; }
  .submit-btn:hover { background:#0191b3; }
  .success-msg { width:100%; max-width:560px; margin-top:1.5rem; background:#fff; border:1.5px solid #99caea; border-radius:6px; padding:1.2rem; font-size:0.9rem; color:#077c83; text-align:center; display:none; }
  .stamp { margin-top:1.1rem; font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; font-size:1.1rem; color:#b0c8d8; letter-spacing:0.04em; text-align:center; }

  /* MODAL */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); z-index:500; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .overlay.open { opacity:1; pointer-events:all; }
  .modal { background:#fff; border:1.5px solid #c5d8e8; border-radius:10px; padding:2rem; width:90%; max-width:320px; transform:translateY(10px); transition:transform 0.2s; position:relative; text-align:center; }
  .overlay.open .modal { transform:translateY(0); }
  .modal img { width:120px; margin-bottom:1rem; }
  .modal h2 { font-size:1rem; font-weight:600; margin-bottom:0.2rem; }
  .modal .sub { font-size:0.75rem; color:#9ab0c0; margin-bottom:1.25rem; }
  .modal input { width:100%; border:1.5px solid #c5d8e8; border-radius:6px; padding:0.6rem 0.8rem; font-family:'Inter',sans-serif; font-size:0.88rem; outline:none; margin-bottom:0.7rem; color:#1a1a2e; transition:border-color 0.15s; }
  .modal input:focus { border-color:#99caea; }
  .modal-btn { width:100%; background:#2d8ef5; color:#fff; border:none; padding:0.65rem; border-radius:6px; font-family:'Inter',sans-serif; font-size:0.88rem; font-weight:500; cursor:pointer; transition:background 0.15s; }
  .modal-btn:hover { background:#1a7de0; }
  .modal-err { font-size:0.73rem; color:#e05a6a; margin-top:0.6rem; min-height:1em; }
  .close-btn { position:absolute; top:0.7rem; right:0.9rem; background:none; border:none; font-size:1rem; color:#9ab0c0; cursor:pointer; }
  .close-btn:hover { color:#1a1a2e; }

  /* ADMIN */
  .admin-panel { position:fixed; inset:0; background:#f0f4f8; z-index:999; overflow-y:auto; display:none; flex-direction:column; }
  .admin-panel.open { display:flex; }
  .admin-header { display:flex; justify-content:space-between; align-items:center; padding:1rem 1.5rem; border-bottom:1.5px solid #c5d8e8; background:#fff; position:sticky; top:0; z-index:10; }
  .admin-header h1 { font-size:0.9rem; font-weight:600; color:#077c83; }
  .logout-btn { background:none; border:1.5px solid #c5d8e8; color:#9ab0c0; font-family:'Inter',sans-serif; font-size:0.75rem; padding:0.3rem 0.75rem; border-radius:6px; cursor:pointer; transition:all 0.15s; }
  .logout-btn:hover { border-color:#e05a6a; color:#e05a6a; }
  .admin-body { max-width:640px; margin:0 auto; padding:1.5rem 1rem 4rem; width:100%; }
  .stats-row { display:grid; grid-template-columns:repeat(2,1fr); gap:0.6rem; margin-bottom:1.5rem; }
  .stat { background:#fff; border:1.5px solid #c5d8e8; border-radius:8px; padding:0.9rem; text-align:center; }
  .stat .n { font-size:1.7rem; font-weight:600; color:#077c83; line-height:1; }
  .stat .l { font-size:0.67rem; color:#9ab0c0; text-transform:uppercase; letter-spacing:0.1em; margin-top:0.25rem; }
  .sec-label { font-size:0.68rem; font-weight:600; color:#9ab0c0; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.6rem; }
  .admin-row { background:#fff; border:1.5px solid #c5d8e8; border-radius:6px; padding:0.85rem 1rem; margin-bottom:0.5rem; display:flex; gap:0.75rem; align-items:flex-start; }
  .admin-row .body { flex:1; }
  .admin-row .body .msg { font-size:0.88rem; line-height:1.5; color:#1a1a2e; }
  .admin-row .body .meta { font-size:0.67rem; color:#9ab0c0; margin-top:0.3rem; display:flex; gap:0.5rem; align-items:center; }
  .timestamp { color:#b0c8d8; font-weight:400; font-size:0.65rem; }
  .badge { font-size:0.6rem; font-weight:600; padding:2px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:0.07em; }
  .bnew { background:rgba(7,124,131,0.1); color:#077c83; }
  .row-acts { display:flex; flex-direction:column; gap:0.3rem; }
  .act { font-family:'Inter',sans-serif; font-size:0.68rem; font-weight:500; padding:0.28rem 0.6rem; border-radius:5px; cursor:pointer; border:1.5px solid; transition:all 0.15s; white-space:nowrap; background:none; }
  .a-read { border-color:rgba(7,124,131,0.3); color:#077c83; }
  .a-read:hover { background:rgba(7,124,131,0.08); }
  .a-del { border-color:rgba(224,90,106,0.3); color:#e05a6a; }
  .a-del:hover { background:rgba(224,90,106,0.08); }
  .empty { text-align:center; color:#9ab0c0; font-size:0.85rem; padding:3rem 0; }
  .day-divider { display:flex; align-items:center; gap:0.6rem; margin:1rem 0 0.6rem; color:#b0c8d8; font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; }
  .day-divider::before, .day-divider::after { content:''; flex:1; height:1px; background:#dde8f0; }

  /* USER HISTORY PANEL */
  .history-panel { position:fixed; inset:0; background:#f0f4f8; z-index:800; overflow-y:auto; display:none; flex-direction:column; }
  .history-panel.open { display:flex; }
  .history-header { display:flex; justify-content:space-between; align-items:center; padding:1rem 1.5rem; border-bottom:1.5px solid #c5d8e8; background:#fff; position:sticky; top:0; z-index:10; }
  .history-header h1 { font-size:0.9rem; font-weight:600; color:#077c83; }
  .history-body { max-width:560px; margin:0 auto; padding:1.5rem 1rem 4rem; width:100%; }
  .history-item { background:#fff; border:1.5px solid #c5d8e8; border-radius:6px; padding:0.85rem 1rem; margin-bottom:0.5rem; }
  .history-item .htxt { font-size:0.9rem; line-height:1.5; color:#1a1a2e; }
  .history-item .htime { font-size:0.65rem; color:#b0c8d8; margin-top:0.35rem; }
  .history-btn { background:none; border:none; color:#b0c8d8; font-size:1rem; font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300; cursor:pointer; text-decoration:none; position:fixed; top:1rem; right:1.2rem; z-index:10; }
  .history-btn:hover { color:#077c83; }
  .history-empty { text-align:center; color:#9ab0c0; font-size:0.85rem; padding:3rem 0; }

  /* Heart burst animation */
  .heart-burst { position:fixed; pointer-events:none; z-index:9999; }
  .heart-burst span {
    position:absolute;
    font-size:1.4rem;
    animation:heartFly 0.9s ease-out forwards;
    transform-origin:center;
  }
  @keyframes heartFly {
    0%   { opacity:1; transform:translate(0,0) scale(1); }
    100% { opacity:0; transform:translate(var(--tx),var(--ty)) scale(0.3); }
  }

  /* Admin category tabs */
  .cat-tabs { display:flex; gap:0.4rem; margin-bottom:1rem; flex-wrap:wrap; }
  .cat-tab { background:none; border:1.5px solid #c5d8e8; border-radius:20px; padding:0.3rem 0.9rem; font-family:'Inter',sans-serif; font-size:0.72rem; font-weight:500; color:#9ab0c0; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .cat-tab:hover { border-color:#99caea; color:#077c83; }
  .cat-tab.active { background:#077c83; border-color:#077c83; color:#fff; }
  .cat-tab .cat-count { background:rgba(255,255,255,0.25); border-radius:10px; padding:0 5px; margin-left:4px; font-size:0.65rem; }


  /* Admin top nav tabs */
  .admin-nav { display:flex; gap:0; border-bottom:1.5px solid #c5d8e8; margin-bottom:1.5rem; background:#fff; position:sticky; top:65px; z-index:5; }
  .admin-nav-tab { background:none; border:none; border-bottom:2.5px solid transparent; padding:0.7rem 1.2rem; font-family:'Inter',sans-serif; font-size:0.8rem; font-weight:500; color:#9ab0c0; cursor:pointer; transition:all 0.15s; margin-bottom:-1.5px; }
  .admin-nav-tab:hover { color:#077c83; }
  .admin-nav-tab.active { color:#077c83; border-bottom-color:#077c83; }

  /* Admin toolbar */
  .admin-toolbar { display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
  .search-input { flex:1; min-width:160px; border:1.5px solid #c5d8e8; border-radius:6px; padding:0.45rem 0.8rem; font-family:'Inter',sans-serif; font-size:0.82rem; outline:none; color:#1a1a2e; transition:border-color 0.15s; }
  .search-input:focus { border-color:#99caea; }
  .sort-select { border:1.5px solid #c5d8e8; border-radius:6px; padding:0.45rem 0.7rem; font-family:'Inter',sans-serif; font-size:0.78rem; color:#9ab0c0; outline:none; background:#fff; cursor:pointer; }
  .export-btn { background:none; border:1.5px solid #c5d8e8; border-radius:6px; padding:0.45rem 0.8rem; font-family:'Inter',sans-serif; font-size:0.78rem; color:#9ab0c0; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .export-btn:hover { border-color:#077c83; color:#077c83; }

  /* Winner highlight */
  .admin-row.winner { border-color:#f0c040; background:rgba(240,192,64,0.06); }
  .a-crown { border-color:rgba(240,192,64,0.4); color:#c8920a; }
  .a-crown:hover { background:rgba(240,192,64,0.1); }
  .a-crown.crowned { background:rgba(240,192,64,0.15); border-color:#f0c040; }
  .winner-badge { font-size:0.6rem; font-weight:600; padding:2px 6px; border-radius:4px; background:rgba(240,192,64,0.15); color:#c8920a; text-transform:uppercase; letter-spacing:0.07em; }

  /* Stats tab */
  .stats-section { display:none; }
  .stats-section.active { display:block; }
  .submissions-section { display:block; }
  .submissions-section.hidden { display:none; }
  .stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:0.6rem; margin-bottom:1.5rem; }
  .stat-card-big { background:#fff; border:1.5px solid #c5d8e8; border-radius:8px; padding:1rem; }
  .stat-card-big .label { font-size:0.68rem; color:#9ab0c0; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.3rem; }
  .stat-card-big .value { font-size:1.5rem; font-weight:600; color:#077c83; }
  .stat-card-big .sub-val { font-size:0.72rem; color:#9ab0c0; margin-top:0.2rem; }
  .chart-card { background:#fff; border:1.5px solid #c5d8e8; border-radius:8px; padding:1rem 1rem 0.5rem; margin-bottom:1rem; }
  .chart-card h3 { font-size:0.75rem; font-weight:600; color:#9ab0c0; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:1rem; }
  .bar-chart { display:flex; align-items:flex-end; gap:4px; height:80px; }
  .bar-wrap { display:flex; flex-direction:column; align-items:center; flex:1; height:100%; justify-content:flex-end; }
  .bar { width:100%; background:linear-gradient(180deg,#99caea,#077c83); border-radius:3px 3px 0 0; min-height:2px; transition:height 0.4s; }
  .bar-label { font-size:0.55rem; color:#9ab0c0; margin-top:4px; text-align:center; white-space:nowrap; }
  .hour-chart { display:flex; align-items:flex-end; gap:2px; height:60px; }
  .cat-breakdown { display:grid; grid-template-columns:repeat(2,1fr); gap:0.5rem; }
  .cat-stat { background:#fff; border:1.5px solid #c5d8e8; border-radius:8px; padding:0.8rem; display:flex; justify-content:space-between; align-items:center; }
  .cat-stat .cat-name { font-size:0.78rem; color:#1a1a2e; }
  .cat-stat .cat-n { font-size:1.2rem; font-weight:600; color:#077c83; }

  /* DARK MODE */
  body.dark { background:#0d1117; color:#e8edf0; }
  body.dark .input-wrap { border-color:rgba(255,255,255,0.1); background:rgba(255,255,255,0.06); backdrop-filter:blur(12px); }
  body.dark .input-wrap input { color:#e8edf0; }
  body.dark .input-wrap input::placeholder { color:#4a6070; }
  body.dark .submit-btn { background:#01a7cf; }
  body.dark .success-msg { background:rgba(255,255,255,0.05); border-color:#077c83; color:#77d4e8; }
  body.dark .modal { background:#161b22; border-color:#30363d; }
  body.dark .modal input { background:#0d1117; border-color:#30363d; color:#e8edf0; }
  body.dark .modal h2 { color:#e8edf0; }
  body.dark .admin-panel { background:#0d1117; }
  body.dark .admin-header { background:#161b22; border-color:#30363d; }
  body.dark .admin-nav { background:#161b22; border-color:#30363d; }
  body.dark .admin-nav-tab { color:#4a6070; }
  body.dark .admin-nav-tab.active { color:#77d4e8; border-bottom-color:#77d4e8; }
  body.dark .admin-body { background:#0d1117; }
  body.dark .admin-toolbar .search-input { background:#161b22; border-color:#30363d; color:#e8edf0; }
  body.dark .admin-toolbar .search-input::placeholder { color:#4a6070; }
  body.dark .sort-select { background:#161b22; border-color:#30363d; color:#9ab0c0; }
  body.dark .export-btn { border-color:#30363d; color:#9ab0c0; }
  body.dark .cat-tab { border-color:#30363d; color:#4a6070; background:none; }
  body.dark .cat-tab.active { background:#077c83; border-color:#077c83; color:#fff; }
  body.dark .admin-row { background:#161b22; border-color:#30363d; }
  body.dark .admin-row.winner { background:rgba(240,192,64,0.08); border-color:rgba(240,192,64,0.3); }
  body.dark .admin-row .body .msg { color:#e8edf0; }
  body.dark .stat { background:#161b22; border-color:#30363d; }
  body.dark .stat-card-big { background:#161b22; border-color:#30363d; }
  body.dark .chart-card { background:#161b22; border-color:#30363d; }
  body.dark .cat-stat { background:#161b22; border-color:#30363d; }
  body.dark .cat-stat .cat-name { color:#e8edf0; }
  body.dark .day-divider { color:#4a6070; }
  body.dark .day-divider::before, body.dark .day-divider::after { background:#30363d; }
  body.dark .history-panel { background:#0d1117; }
  body.dark .history-header { background:#161b22; border-color:#30363d; }
  body.dark .history-item { background:#161b22; border-color:#30363d; }
  body.dark .history-item .htxt { color:#e8edf0; }
  body.dark .flake { color:rgba(153,202,234,0.4); }
  body.dark .stamp { color:#3a5060; }
  body.dark .history-btn { color:#3a5060; }
  body.dark .footer { color:#3a5060; }

  /* Dark mode toggle button */
  .dark-toggle {
    position:fixed;
    top:1rem;
    left:1rem;
    z-index:100;
    background:none;
    border:1.5px solid #c5d8e8;
    border-radius:20px;
    padding:0.3rem 0.7rem;
    font-size:0.85rem;
    cursor:pointer;
    color:#9ab0c0;
    font-family:'Inter',sans-serif;
    transition:all 0.2s;
    backdrop-filter:blur(8px);
    background:rgba(255,255,255,0.5);
  }
  .dark-toggle:hover { border-color:#077c83; color:#077c83; }
  body.dark .dark-toggle { background:rgba(0,0,0,0.3); border-color:#30363d; color:#4a6070; }
  body.dark .dark-toggle:hover { border-color:#77d4e8; color:#77d4e8; }

  /* Smooth page transitions */
  .history-panel, .admin-panel {
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .history-panel.open, .admin-panel.open {
    opacity: 1;
  }
  #mainSite {
    transition: opacity 0.3s ease;
  }
  #mainSite.fading {
    opacity: 0;
    pointer-events: none;
  }
  .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(8px); background:#1a1a2e; color:#fff; padding:0.5rem 1.2rem; border-radius:30px; font-size:0.8rem; z-index:9999; opacity:0; transition:all 0.25s; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

function playKissSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  
  // Soft "mwah" - lip smack tone
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const filter = ctx.createBiquadFilter();

  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(800, ctx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.15);
  filter.Q.value = 2;

  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.18);

  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);

  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.25);
}


function burstHearts(btn) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const emojis = ['💋','💋','💋','❤️','💕','💋','❤️','💋'];
  const burst = document.createElement('div');
  burst.className = 'heart-burst';
  burst.style.left = cx + 'px';
  burst.style.top = cy + 'px';
  emojis.forEach((e, i) => {
    const span = document.createElement('span');
    span.textContent = e;
    const angle = (i / emojis.length) * 2 * Math.PI;
    const dist = 60 + Math.random() * 50;
    span.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    span.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    span.style.animationDelay = (Math.random() * 0.15) + 's';
    burst.appendChild(span);
  });
  document.body.appendChild(burst);
  setTimeout(() => burst.remove(), 1200);
}

let allPosts = [];
let activeTab = 'all';
let winners = new Set(JSON.parse(localStorage.getItem('winners') || '[]'));

function getCategory(text) {
  const t = text.toLowerCase();
  // Dog of the Day — dotd, dog
  if (t.includes('dog') || t.includes('dotd') || t.includes('dog of the day')) return 'dog';
  // Fairy Godmother — fg, fairy, godmother, fgm
  if (t.includes('fairy') || t.includes('godmother') || t.includes('fgm') || t === 'fg' || t.includes(' fg ') || t.startsWith('fg ') || t.endsWith(' fg') || t.includes('fairy godmother')) return 'fairy';
  // Jerry — jerry, jer
  if (t.includes('jerry') || t.includes(' jer ') || t.startsWith('jer ') || t.endsWith(' jer') || t === 'jer') return 'jerry';
  // Slug of the Day — slug, sotd
  if (t.includes('slug') || t.includes('sotd') || t.includes('slug of the day')) return 'slug';
  return null;
}

function showAdminView(view) {

function updateCounts(posts) {
  document.getElementById('count-all').textContent = posts.length;
  document.getElementById('count-dog').textContent = posts.filter(p => getCategory(p.text)==='dog').length;
  document.getElementById('count-fairy').textContent = posts.filter(p => getCategory(p.text)==='fairy').length;

  document.getElementById('count-slug').textContent = posts.filter(p => getCategory(p.text)==='slug').length;
  document.getElementById('count-unread').textContent = posts.filter(p => !p.read).length;
  document.getElementById('count-winners').textContent = winners.size;

function toggleWinner(id) {
  if (winners.has(id)) winners.delete(id);
  else winners.add(id);
  localStorage.setItem('winners', JSON.stringify([...winners]));
  updateCounts(allPosts);
  renderPosts();
}

function renderPosts() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const sort = document.getElementById('sortSelect')?.value || 'newest';

  let filtered = [...allPosts];
  if (activeTab === 'dog') filtered = filtered.filter(p => getCategory(p.text)==='dog');
  else if (activeTab === 'fairy') filtered = filtered.filter(p => getCategory(p.text)==='fairy');
  else if (activeTab === 'jerry') filtered = filtered.filter(p => getCategory(p.text)==='jerry');
  else if (activeTab === 'slug') filtered = filtered.filter(p => getCategory(p.text)==='slug');
  else if (activeTab === 'unread') filtered = filtered.filter(p => !p.read);
  else if (activeTab === 'winners') filtered = filtered.filter(p => winners.has(p.id));

  if (search) filtered = filtered.filter(p => p.text.toLowerCase().includes(search));
  if (sort === 'oldest') filtered.reverse();

  if (filtered.length === 0) {
    document.getElementById('adminPostList').innerHTML = '<div class="empty">No submissions here yet</div>';
    return;
  }
  let html = '';
  let lastDay = '';
  filtered.forEach(p => {
    const date = new Date(p.submitted_at);
    const dayKey = date.toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'long'});
    const t = date.toLocaleString('en-AU', {hour:'2-digit', minute:'2-digit'});
    const isWinner = winners.has(p.id);
    if (dayKey !== lastDay) {
      html += `<div class="day-divider">❄ ${dayKey}</div>`;
      lastDay = dayKey;
    }
    html += `
    <div class="admin-row${isWinner ? ' winner' : ''}">
      <div class="body">
        <div class="msg">${esc(p.text)}</div>
        <div class="meta">
          <span class="timestamp">${t}</span>
          ${!p.read ? '<span class="badge bnew">New</span>' : ''}
          ${isWinner ? '<span class="winner-badge">👑 Winner</span>' : ''}
        </div>
      </div>
      <div class="row-acts">
        <button class="act a-crown${isWinner ? ' crowned' : ''}" onclick="toggleWinner(${p.id})">${isWinner ? '👑 Crowned' : '👑 Crown'}</button>
        ${!p.read ? `<button class="act a-read" onclick="markRead(${p.id})">Mark read</button>` : ''}
        <button class="act a-del" onclick="deletePost(${p.id})">Delete</button>
      </div>
    </div>`;
  });
  document.getElementById('adminPostList').innerHTML = html;
}

function renderStats() {
  const posts = allPosts;
  document.getElementById('s-total').textContent = posts.length;
  document.getElementById('s-unread').textContent = posts.filter(p => !p.read).length;

  // Per day
  const dayCounts = {};
  const hourCounts = Array(24).fill(0);
  posts.forEach(p => {
    const d = new Date(p.submitted_at);
    const day = d.toLocaleDateString('en-AU', {day:'numeric', month:'short'});
    dayCounts[day] = (dayCounts[day] || 0) + 1;
    hourCounts[d.getHours()]++;
  });

  // Most active day
  const busyDay = Object.entries(dayCounts).sort((a,b) => b[1]-a[1])[0];
  document.getElementById('s-busyday').textContent = busyDay ? `${busyDay[0]} (${busyDay[1]})` : '—';

  // Peak hour
  const peakHour = hourCounts.indexOf(Math.max(...hourCounts));
  const peakLabel = hourCounts[peakHour] > 0 ? `${peakHour}:00–${peakHour+1}:00` : '—';
  document.getElementById('s-peakhour').textContent = peakLabel;

  // Day bar chart (last 7 days)
  const days = Object.keys(dayCounts).slice(-7);
  const maxDay = Math.max(...days.map(d => dayCounts[d]), 1);
  document.getElementById('dayChart').innerHTML = days.map(d => `
    <div class="bar-wrap">
      <div class="bar" style="height:${Math.round((dayCounts[d]/maxDay)*72)}px"></div>
      <div class="bar-label">${d}</div>
    </div>`).join('') || '<div class="empty" style="width:100%">No data yet</div>';

  // Hour chart
  const maxHour = Math.max(...hourCounts, 1);
  document.getElementById('hourChart').innerHTML = hourCounts.map((c, h) => `
    <div class="bar-wrap" title="${h}:00 — ${c} submissions">
      <div class="bar" style="height:${Math.round((c/maxHour)*52)}px;background:${c===Math.max(...hourCounts)&&c>0?'#077c83':'#99caea'}"></div>
      <div class="bar-label">${h%6===0?h+'h':''}</div>
    </div>`).join('');

  // Category breakdown
  const cats = [
    {name:'🐶 Dog of the Day', key:'dog'},
    {name:'🧚 Fairy Godmother', key:'fairy'},
    {name:'🚧 Jerry', key:'jerry'},
    {name:'🐌 Slug', key:'slug'},
  ];
  document.getElementById('catBreakdown').innerHTML = cats.map(c => `
    <div class="cat-stat">
      <div class="cat-name">${c.name}</div>
      <div class="cat-n">${posts.filter(p => getCategory(p.text)===c.key).length}</div>
    </div>`).join('');
}

function exportCSV() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let rows = activeTab === 'all' ? allPosts :
    activeTab === 'dog' ? allPosts.filter(p => getCategory(p.text)==='dog') :
    activeTab === 'fairy' ? allPosts.filter(p => getCategory(p.text)==='fairy') :
    activeTab === 'jerry' ? allPosts.filter(p => getCategory(p.text)==='jerry') :
    activeTab === 'slug' ? allPosts.filter(p => getCategory(p.text)==='slug') :
    activeTab === 'winners' ? allPosts.filter(p => winners.has(p.id)) :
    allPosts.filter(p => !p.read);
  if (search) rows = rows.filter(p => p.text.toLowerCase().includes(search));
  const csv = ['Submission,Category,Time,Winner'].concat(
    rows.map(p => `"${p.text.replace(/"/g,'""')}","${getCategory(p.text)||'general'}","${new Date(p.submitted_at).toLocaleString('en-AU')}","${winners.has(p.id)?'Yes':'No'}"`)
  ).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `ucsnow-gossip-${activeTab}.csv`;
  a.click();
}
